<!DOCTYPE html>
<html>
<head>
  <title>SoundNest - Home</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial;
      background-color: #f5f6fa;
    }

    /* HEADER */
    header {
      background-color: #0a0a23;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
    }

    nav a:hover {
      color: #00bcd4;
    }

    /* HERO */
    .hero {
      height: 80vh;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
      url('https://images.unsplash.com/photo-1511379938547-c1f69419868d');
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
    }

    .hero-content {
      max-width: 600px;
    }

    .hero h2 {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .hero p {
      font-size: 20px;
      margin-bottom: 25px;
    }

    /* BUTTON */
    .btn {
      padding: 15px 30px;
      background: linear-gradient(45deg, #00bcd4, #2196f3);
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    /* FEATURES */
    .features {
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 60px 20px;
      flex-wrap: wrap;
    }

    .feature-box {
      background: white;
      width: 260px;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .feature-box:hover {
      transform: translateY(-10px);
    }

    .feature-box h3 {
      margin-bottom: 10px;
    }

    .feature-box p {
      color: #555;
    }

    /* FOOTER */
    footer {
      background-color: #0a0a23;
      color: white;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>🎵 SoundNest</h1>

  <nav>
    <a href="index.html">Home</a>
    <a href="vinili.html">Vinili</a>
    <a href="login.html">Login</a>
  </nav>
</header>

<main>

  <div class="hero">
    <div class="hero-content">
      <h2>Scopri il suono autentico del vinile</h2>
      <p>I migliori album, direttamente a casa tua</p>

      <a href="vinili.html">
        <button class="btn">Vai ai Vinili</button>
      </a>
    </div>
  </div>

  <div class="features">

    <div class="feature-box">
      <h3>🎶 Qualità</h3>
      <p>Vinili selezionati con la migliore qualità audio</p>
    </div>

    <div class="feature-box">
      <h3>🚚 Spedizione</h3>
      <p>Consegna veloce e sicura</p>
    </div>

    <div class="feature-box">
      <h3>💿 Collezione</h3>
      <p>Classici e novità sempre disponibili</p>
    </div>

  </div>

</main>

<footer>
  <p>© SoundNest</p>
</footer>

</body>
</html>
