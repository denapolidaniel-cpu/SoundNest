<!DOCTYPE html>
<html>
<head>
  <title>SoundNest - Home</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background-color: #f0f2f5;
      text-align: center;
    }

    header {
      background-color: darkblue;
      color: white;
      padding: 20px;
    }

    nav a {
      color: white;
      margin: 10px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .hero {
      padding: 80px 20px;
    }

    .hero h2 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
      color: #555;
    }

    .btn {
      margin-top: 20px;
      padding: 15px 25px;
      background-color: darkblue;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .btn:hover {
      background-color: navy;
    }

    .features {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 40px;
      flex-wrap: wrap;
    }

    .feature-box {
      background: white;
      width: 250px;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    footer {
      margin-top: 40px;
      padding: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>🎵 SoundNest</h1>

  <nav>
    <a href="index.html">Home</a>
    <a href="vinili.html">Vinili</a>
    <a href="login.html">Login</a>
  </nav>
</header>

<main>

  <div class="hero">
    <h2>Scopri il suono autentico del vinile</h2>
    <p>I migliori album, direttamente a casa tua</p>

    <a href="vinili.html">
      <button class="btn">Vai ai Vinili</button>
    </a>
  </div>

  <div class="features">

    <div class="feature-box">
      <h3>🎶 Qualità</h3>
      <p>Vinili selezionati con la migliore qualità audio</p>
    </div>

    <div class="feature-box">
      <h3>🚚 Spedizione</h3>
      <p>Consegna veloce e sicura</p>
    </div>

    <div class="feature-box">
      <h3>💿 Collezione</h3>
      <p>Classici e novità sempre disponibili</p>
    </div>

  </div>

</main>

<footer>
  <p>© SoundNest</p>
</footer>

</body>
</html>
