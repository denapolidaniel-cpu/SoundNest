<!DOCTYPE html>
<html>
<head>
  <title>SoundNest - Login</title>
  <style>
    body {
      background-color: #f0f2f5;
      font-family: Arial;
      text-align: center;
    }

    input {
      padding: 10px;
      margin: 5px;
    }

    button {
      padding: 10px;
      background-color: darkblue;
      color: white;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<main>

  <h2>Login</h2>

  <input type="email" id="email" placeholder="Email"><br>

  <input type="password" id="password" placeholder="Password"><br>

  <button onclick="login()">Accedi</button>

  <p id="messaggio"></p>

</main>

<script>

function login(){

  const email = document.getElementById("email").value;

  const password = document.getElementById("password").value;

  // account demo
  const emailCorretta = "admin@soundnest.com";
  const passwordCorretta = "1234";

  if(email === emailCorretta &&
     password === passwordCorretta){

    // UTENTE LOGGATO
    const utente = {
      email: email
    };

    // salva login
    localStorage.setItem(
      "utenteLoggato",
      JSON.stringify(utente)
    );

    document.getElementById("messaggio")
      .innerText = "Login effettuato!";

    // reindirizzamento
    window.location.href = "vinili.html";

  } else {

    document.getElementById("messaggio")
      .innerText = "Email o password errati";
  }
}

</script>

</main>

<footer>
  <p>© SoundNest</p>
</footer>

</body>
</html>
