<!DOCTYPE html>
<html>
<head>
  <title>SoundNest - Login</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      font-family:'Segoe UI', sans-serif;

      background:
      linear-gradient(
      rgba(0,0,0,0.7),
      rgba(0,0,0,0.8)),

      url('https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f');

      background-size:cover;
      background-position:center;

      overflow:hidden;
    }

    .login-box{

      width:420px;

      padding:45px;

      border-radius:30px;

      background:
      rgba(255,255,255,0.08);

      backdrop-filter:blur(15px);

      box-shadow:
      0 15px 40px rgba(0,0,0,0.5);

      text-align:center;

      animation:fadeUp 0.8s ease;
    }

    @keyframes fadeUp{

      from{
        opacity:0;
        transform:translateY(30px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    h1{

      color:white;

      margin-bottom:10px;

      font-size:42px;
    }

    .subtitle{

      color:#ccc;

      margin-bottom:35px;
    }

    .input-box{

      position:relative;

      margin-bottom:20px;
    }

    input{

      width:100%;

      padding:16px 20px;

      border:none;

      border-radius:40px;

      background:rgba(255,255,255,0.1);

      color:white;

      font-size:16px;

      outline:none;

      border:2px solid transparent;

      transition:0.3s;
    }

    input:focus{

      border-color:#00d4ff;

      box-shadow:
      0 0 15px rgba(0,212,255,0.4);
    }

    input::placeholder{
      color:#bbb;
    }

    .buttons{

      display:flex;

      gap:15px;

      margin-top:20px;
    }

    button{

      flex:1;

      padding:15px;

      border:none;

      border-radius:40px;

      font-size:16px;
      font-weight:bold;

      cursor:pointer;

      transition:0.3s;
    }

    .login-btn{

      background:
      linear-gradient(45deg,#00d4ff,#0066ff);

      color:white;
    }

    .register-btn{

      background:#181818;

      color:white;

      border:2px solid #00d4ff;
    }

    button:hover{

      transform:scale(1.03);
    }

    #messaggio{

      margin-top:25px;

      font-weight:bold;

      color:#00ffae;
    }

    .logo{

      font-size:24px;

      margin-bottom:15px;
    }

    .show-password{

      position:absolute;

      right:20px;
      top:50%;

      transform:translateY(-50%);

      cursor:pointer;

      color:#ccc;
    }

  </style>
</head>

<body>

<div class="login-box">

  <div class="logo">
    🎵
  </div>

  <h1>SoundNest</h1>

  <p class="subtitle">
    Accedi al tuo account
  </p>

  <div class="input-box">

    <input
      type="email"
      id="email"
      placeholder="Email"
    >

  </div>

  <div class="input-box">

    <input
      type="password"
      id="password"
      placeholder="Password"
    >

    <span
      class="show-password"
      onclick="togglePassword()"
    >
      👁
    </span>

  </div>

  <div class="buttons">

    <button
      class="login-btn"
      onclick="login()"
    >
      Accedi
    </button>

    <button
      class="register-btn"
      onclick="registrati()"
    >
      Registrati
    </button>

  </div>

  <p id="messaggio"></p>

</div>

<script>

function togglePassword(){

  const password =
  document.getElementById("password");

  if(password.type === "password"){

    password.type = "text";

  } else {

    password.type = "password";
  }
}

function login(){

  const email =
    document.getElementById("email").value;

  const password =
    document.getElementById("password").value;

  const adminEmail =
    "admin@soundnest.com";

  const adminPassword =
    "1234";

  if(
    email === adminEmail &&
    password === adminPassword
  ){

    const utente = {

      email: email,
      ruolo: "admin"

    };

    localStorage.setItem(
      "utenteLoggato",
      JSON.stringify(utente)
    );

    window.location.href =
    "index.html";

    return;
  }

  const utenti =
    JSON.parse(localStorage.getItem("utenti"))
    || [];

  const utenteTrovato =
    utenti.find(u =>

      u.email === email &&

      u.password === password
    );

  if(utenteTrovato){

    localStorage.setItem(

      "utenteLoggato",

      JSON.stringify(utenteTrovato)
    );

    window.location.href =
    "index.html";

  } else {

    document.getElementById("messaggio")
    .style.color = "#ff4d4d";

    document.getElementById("messaggio")
    .innerText =
    "Email o password errati";
  }

}

function registrati(){

  const email =
    document.getElementById("email")
    .value;

  const password =
    document.getElementById("password")
    .value;

  if(email === "" || password === ""){

    document.getElementById("messaggio")
    .style.color = "#ff4d4d";

    document.getElementById("messaggio")
      .innerText =
      "Compila tutti i campi";

    return;
  }

  let utenti =
    JSON.parse(localStorage.getItem("utenti"))
    || [];

  const esiste =
    utenti.find(u => u.email === email);

  if(esiste){

    document.getElementById("messaggio")
    .style.color = "#ff4d4d";

    document.getElementById("messaggio")
      .innerText =
      "Email già registrata";

    return;
  }

  const nuovoUtente = {

    email: email,
    password: password,
    ruolo: "utente"

  };

  utenti.push(nuovoUtente);

  localStorage.setItem(
    "utenti",
    JSON.stringify(utenti)
  );

  document.getElementById("messaggio")
  .style.color = "#00ffae";

  document.getElementById("messaggio")
    .innerText =
    "Registrazione completata!";
}

</script>

</body>
</html>
