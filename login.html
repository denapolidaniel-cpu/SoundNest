<!DOCTYPE html>
<html>
<head>
  <title>SoundNest - Login</title>
  <style>
    body {
      background-color: #f0f2f5;
      font-family: Arial;
      text-align: center;
    }

    input {
      padding: 10px;
      margin: 5px;
    }

    button {
      padding: 10px;
      background-color: darkblue;
      color: white;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<main>

  <h2>Login</h2>

  <input type="email" id="email" placeholder="Email"><br>

  <input type="password" id="password" placeholder="Password"><br>

  <button onclick="login()">Accedi</button>
  <button onclick="registrati()">
  Registrati
</button>

  <p id="messaggio"></p>

</main>

<script>

function login(){

  const email =
    document.getElementById("email")
    .value;

  const password =
    document.getElementById("password")
    .value;

  // prendo utenti salvati
  const utenti =
    JSON.parse(localStorage.getItem("utenti"))
    || [];

  // cerco utente
  const utenteTrovato =
    utenti.find(u =>

      u.email === email &&
      u.password === password

    );

  if(utenteTrovato){

    // salvo sessione login
    localStorage.setItem(
      "utenteLoggato",

      JSON.stringify(utenteTrovato)
    );

    document.getElementById("messaggio")
      .innerText =
      "Login effettuato!";

    window.location.href =
    "vinili.html";

  } else {

    document.getElementById("messaggio")
      .innerText =
      "Email o password errati";
  }
}

function registrati(){

  const email =
    document.getElementById("email")
    .value;

  const password =
    document.getElementById("password")
    .value;

  if(email === "" || password === ""){

    document.getElementById("messaggio")
      .innerText =
      "Compila tutti i campi";

    return;
  }

  // utenti esistenti
  let utenti =
    JSON.parse(localStorage.getItem("utenti"))
    || [];

  // controllo email già usata
  const esiste =
    utenti.find(u => u.email === email);

  if(esiste){

    document.getElementById("messaggio")
      .innerText =
      "Email già registrata";

    return;
  }

  // nuovo utente
  const nuovoUtente = {

  email: email,
  password: password,

  ruolo: "utente"

};
  utenti.push(nuovoUtente);

  localStorage.setItem(
    "utenti",
    JSON.stringify(utenti)
  );

  document.getElementById("messaggio")
    .innerText =
    "Registrazione completata!";
}

</script>

</main>

<footer>
  <p>© SoundNest</p>
</footer>

</body>
</html>
