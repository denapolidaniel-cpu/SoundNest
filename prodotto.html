<!DOCTYPE html>
<html>
<head>
  <title>Dettaglio Vinile</title>

  <style>
    body{
  background:#0f0f0f;
  color:white;
  font-family:sans-serif;
}

.pagina-prodotto{
  display:flex;
  gap:50px;
  padding:50px;
  align-items:center;
}

.cover{
  width:350px;
  border-radius:20px;
}

.info{
  max-width:600px;
}

.prezzo{
  font-size:30px;
  color:#00d4ff;
}

.descrizione{
  color:#ccc;
  line-height:1.7;
}

button{
  margin-top:20px;
  padding:15px 30px;
  border:none;
  border-radius:30px;
  background:#00d4ff;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

#consigliati{
  display:flex;
  gap:20px;
  padding:30px;
  overflow-x:auto;
}

.card{
  background:#181818;
  padding:15px;
  border-radius:20px;
  width:200px;
  text-align:center;
}

.card img{
  width:100%;
  border-radius:15px;
}
  </style>
</head>

<body>

  <div id="prodotto"></div>

<script>

const vinili = JSON.parse(
  localStorage.getItem("catalogo")
);

if(!vinili){

  document.body.innerHTML = `
    <h1>Catalogo non trovato</h1>
    <p>Torna alla pagina vinili.</p>
  `;

  throw new Error("Catalogo mancante");
}
const index =
localStorage.getItem("vinileSelezionato");

const vinile = vinili[index];

document.getElementById("prodotto")
.innerHTML = `

<div class="pagina-prodotto">

  <img
    src="${vinile.immagine}"
    class="cover"
  >

  <div class="info">

    <h1>${vinile.nome}</h1>

    <h2>${vinile.artista}</h2>

    <p class="prezzo">
      ${vinile.prezzo}€
    </p>

    <p class="descrizione">
  ${vinile.descrizione || "Nessuna descrizione disponibile."}
</p>

    <button onclick="aggiungiCarrello()">
      Aggiungi al carrello
    </button>

  </div>

</div>

<h2>Potrebbe piacerti anche</h2>

<div id="consigliati"></div>

`;

function aggiungiCarrello(){

  let carrello =
  JSON.parse(localStorage.getItem("carrello"))
  || [];

  carrello.push(vinile);

  localStorage.setItem(
    "carrello",
    JSON.stringify(carrello)
  );

  alert("Aggiunto al carrello");
}

const consigliati =
vinili.filter(v =>

  v.genere === vinile.genere &&

  v.nome !== vinile.nome
);

const sezione =
document.getElementById("consigliati");

consigliati.slice(0,4).forEach(album => {

  sezione.innerHTML += `

    <div class="card">

      <img src="${album.immagine}">

      <h3>${album.nome}</h3>

      <p>${album.artista}</p>

    </div>

  `;
});

</script>

</body>
</html>
