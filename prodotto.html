<!DOCTYPE html>
<html>
<head>
  <title>Dettaglio Vinile</title>

  <style>
    body{
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:'Segoe UI', sans-serif;
}

/* PAGINA */

.pagina-prodotto{
  display:flex;
  gap:60px;
  padding:60px;
  align-items:center;
  justify-content:center;
}

/* COVER */

.cover{
  width:380px;
  border-radius:25px;

  box-shadow:
  0 20px 40px rgba(0,0,0,0.5);

  transition:0.4s;
}

.cover:hover{
  transform:scale(1.03);
}

/* INFO */

.info{
  max-width:600px;

  background:rgba(255,255,255,0.03);

  padding:40px;

  border-radius:30px;

  backdrop-filter:blur(10px);

  box-shadow:
  0 15px 40px rgba(0,0,0,0.4);
}

.info h1{
  font-size:48px;
  margin-bottom:10px;
}

.info h2{
  color:#b3b3b3;
  margin-bottom:20px;
}

.prezzo{
  font-size:36px;
  color:#00d4ff;
  font-weight:bold;
}

.descrizione{
  color:#d0d0d0;
  line-height:1.8;
  margin-top:20px;
}

/* BOTTONI */

button{
  margin-top:30px;

  padding:16px 35px;

  border:none;
  border-radius:40px;

  background:
  linear-gradient(45deg,#00d4ff,#0066ff);

  color:white;

  font-size:16px;
  font-weight:bold;

  cursor:pointer;

  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  opacity:0.9;
}

/* TORNA INDIETRO */

.back-btn{
  display:inline-block;

  margin:30px;

  padding:12px 25px;

  border-radius:30px;

  background:#181818;

  color:#00d4ff;

  text-decoration:none;
  font-weight:bold;

  transition:0.3s;
}

.back-btn:hover{
  background:#00d4ff;
  color:black;
}

/* CONSIGLIATI */

h2{
  text-align:center;
  margin-top:30px;
}

#consigliati{
  display:flex;
  gap:25px;

  padding:40px;

  overflow-x:auto;
}

.card{
  min-width:220px;

  background:#181818;

  padding:15px;

  border-radius:25px;

  text-align:center;

  transition:0.4s;

  cursor:pointer;

  box-shadow:
  0 10px 25px rgba(0,0,0,0.4);
}

.card:hover{
  transform:
  translateY(-8px)
  scale(1.03);

  box-shadow:
  0 15px 35px rgba(0,212,255,0.3);
}

.card img{
  width:100%;
  border-radius:20px;
}

.card h3{
  margin-top:15px;
}

.card p{
  color:#aaa;
}

/* RESPONSIVE */

@media(max-width:768px){

  .pagina-prodotto{
    flex-direction:column;
    padding:25px;
  }

  .cover{
    width:90%;
  }

  .info{
    width:100%;
    padding:25px;
  }

  .info h1{
    font-size:36px;
  }

}

#consigliati::-webkit-scrollbar{
  height:8px;
}

#consigliati::-webkit-scrollbar-thumb{
  background:#00d4ff;
  border-radius:20px;
}
  </style>
</head>

<body>

  <div id="prodotto"></div>

<script>

const vinili = JSON.parse(
  localStorage.getItem("catalogo")
);

if(!vinili){

  document.body.innerHTML = `
    <h1>Catalogo non trovato</h1>
    <p>Torna alla pagina vinili.</p>
  `;

  throw new Error("Catalogo mancante");
}
const vinile = JSON.parse(
  localStorage.getItem("vinileSelezionato")
);

if(!vinile){

  document.body.innerHTML = `
    <h1>Prodotto non trovato</h1>
  `;

  throw new Error("Vinile mancante");
}
  

document.getElementById("prodotto")
.innerHTML = `

<a href="vinili.html" class="back-btn">
  ← Torna al catalogo
</a>

<div class="pagina-prodotto">

  <img
    src="${vinile.immagine}"
    class="cover"
  >

  <div class="info">

    <h1>${vinile.nome}</h1>

    <h2>${vinile.artista}</h2>

    <p class="prezzo">
      ${vinile.prezzo}€
    </p>

    <p class="descrizione">
  ${vinile.descrizione || "Nessuna descrizione disponibile."}
</p>

    <button onclick="aggiungiCarrello()">
      Aggiungi al carrello
    </button>

  </div>

</div>

<h2>Potrebbe piacerti anche</h2>

<div id="consigliati"></div>

`;

function aggiungiCarrello(){

  let carrello =
  JSON.parse(localStorage.getItem("carrello"))
  || [];

  carrello.push(vinile);

  localStorage.setItem(
    "carrello",
    JSON.stringify(carrello)
  );

  alert("Aggiunto al carrello");
}

const consigliati =
vinili.filter(v =>

  v.genere === vinile.genere &&

  v.nome !== vinile.nome
);

const sezione =
document.getElementById("consigliati");

consigliati.slice(0,4).forEach(album => {

  const card = document.createElement("div");

  card.className = "card";

  card.innerHTML = `
    <img src="${album.immagine}">

    <h3>${album.nome}</h3>

    <p>${album.artista}</p>
  `;

  card.addEventListener("click", () => {

    apriProdotto(album);

  });

  sezione.appendChild(card);

});

function apriProdotto(album){

  localStorage.setItem(
    "vinileSelezionato",
    JSON.stringify(album)
  );

  window.location.href =
  "prodotto.html";
}

</script>

</body>
</html>
