function mostraVinili(lista){

  container.innerHTML = "";

lista.forEach((vinile, index) => {

    container.innerHTML += `

      <div class="card" data-genere="${vinile.genere}">

        <img src="${vinile.immagine}" alt="${vinile.nome}">

        <h3>${vinile.nome}</h3>

        <p>${vinile.artista}</p>

        <p>${vinile.prezzo}€</p>

        <button onclick="
  apriProdotto(${index})
">
  Compra
</button>

      </div>

    `;
  });

  function apriProdotto(index){

  localStorage.setItem(
    "vinileSelezionato",
    index
  );

  window.location.href = "prodotto.html";
}
}

  const datiUtente =
  JSON.parse(localStorage.getItem("utenteLoggato"));

if(datiUtente){

  document.getElementById("utente")
    .innerText =
    "👤 " + datiUtente.email;
}

  
  function logout(){

  localStorage.removeItem("utenteLoggato");

  window.location.href = "login.html";
}

  
function filtraGenere(genere, bottone){

  let filtrati;

  if(genere === "tutti"){

    filtrati = vinili;

  } else {

    filtrati = vinili.filter(v =>
      v.genere === genere
    );
  }

  mostraVinili(filtrati);

  let bottoni =
    document.querySelectorAll(".filtri button");

  bottoni.forEach(btn => {
    btn.classList.remove("attivo");
  });

  bottone.classList.add("attivo");
}

function aggiungi(nome, prezzo){

  const utente =
    localStorage.getItem("utenteLoggato");

  if(!utente){

    alert("Devi effettuare il login per acquistare");

    window.location.href = "login.html";

    return;
  }

  // prendo carrello esistente
  let carrello =
    JSON.parse(localStorage.getItem("carrello")) || [];

  // aggiungo prodotto
  carrello.push({
    nome: nome,
    prezzo: prezzo
  });

  // salvo carrello
  localStorage.setItem(
    "carrello",
    JSON.stringify(carrello)
  );

  aggiornaCarrello();
}
  function aggiornaCarrello(){

  let carrello =
    JSON.parse(localStorage.getItem("carrello")) || [];

  let lista =
    document.getElementById("lista-carrello");

  lista.innerHTML = "";

  let totale = 0;

  carrello.forEach(prodotto => {

    let item = document.createElement("li");

    item.innerText =
      prodotto.nome + " - " +
      prodotto.prezzo + "€";

    lista.appendChild(item);

    totale += prodotto.prezzo;
  });

  document.getElementById("totale")
    .innerText = totale;
}

// aggiorna carrello all'apertura pagina
aggiornaCarrello();
