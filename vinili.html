<!DOCTYPE html>
<html>
<head>
  <title>SoundNest - Vinili</title>
  <style>
    body{
  margin:0;
  background:#0f0f0f;
  font-family:'Segoe UI', sans-serif;
  color:white;
  text-align:center;
}
    .container{
  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(250px,1fr));

  gap:30px;

  padding:40px;

  justify-items:center;
}

    button {
      background-color: darkblue;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
    }

    #carrello{
  background:#181818;
  border-radius:20px;
  padding:20px;
  width:320px;

  margin:30px auto;

  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

#carrello h3{
  color:#00d4ff;
}

#lista-carrello{
  text-align:left;
}
 .filtri {
  margin: 20px;
}

.filtri button{
  background:#181818;
  border:2px solid #00d4ff;
  color:#00d4ff;

  padding:10px 18px;
  margin:5px;

  border-radius:30px;

  cursor:pointer;

  transition:0.3s;
}

.filtri button:hover{
  background:#00d4ff;
  color:black;
}

.filtri button.attivo{
  background:#00d4ff;
  color:black;
}

.card{
  background: #181818;
  width:100%;
max-width:260px;
  border-radius:20px;
  overflow:hidden;

  transition:0.4s;
  cursor:pointer;

  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

.card:hover{
  transform: translateY(-10px) scale(1.02);
  box-shadow: 0 15px 35px rgba(0,212,255,0.3);
}

.card img{
  width:100%;
  height:260px;
  object-fit:cover;
}

.card h3{
  margin-top:15px;
  font-size:22px;
}

.card p{
  color:#b3b3b3;
}

    header{
  background: rgba(20,20,20,0.9);
  backdrop-filter: blur(10px);
  padding: 20px 40px;

  display:flex;
  justify-content: space-between;
  align-items:center;

  position: sticky;
  top:0;
  z-index:100;
}

header h1{
  color:#00d4ff;
  font-size:32px;
}

nav{
  display:flex;
  gap:20px;
  align-items:center;
}

nav a{
  color:white;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

nav a:hover{
  color:#00d4ff;
}

  .card button{
  margin:15px 0;
  width:85%;
  padding:12px;

  border:none;
  border-radius:30px;

  background: linear-gradient(45deg,#00d4ff,#0066ff);

  color:white;
  font-size:16px;
  font-weight:bold;

  transition:0.3s;
}

.card button:hover{
  transform:scale(1.05);
  opacity:0.9;
}

.hero{
  height:300px;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  text-align:center;

  background:
  linear-gradient(rgba(0,0,0,0.6),
  rgba(0,0,0,0.7)),
  url('https://images.unsplash.com/photo-1511379938547-c1f69419868d');

  background-size:cover;
  background-position:center;
}

.hero h1{
  font-size:48px;
  margin-bottom:10px;
  color:white;
}

.hero p{
  font-size:20px;
  color:#ccc;
}

.checkout-btn{
  display:inline-block;

  margin-top:20px;
  padding:15px 30px;

  border-radius:40px;

  background:
  linear-gradient(45deg,#00d4ff,#0066ff);

  color:white;
  text-decoration:none;

  font-weight:bold;

  transition:0.3s;
}

.checkout-btn:hover{
  transform:scale(1.05);
}

footer{
  margin-top:50px;
  padding:30px;

  background:#181818;

  color:#888;
}

    @media(max-width:768px){

  header{
    flex-direction:column;
    gap:15px;
  }

  .hero h1{
    font-size:36px;
  }

  .hero p{
    font-size:18px;
  }

  #carrello{
    width:90%;
  }

}
.card{
  animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{

  from{
    opacity:0;
    transform:translateY(20px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}
  </style>
</head>

<body>

<header>
  <h1>SoundNest</h1>

  <nav>
    <a href="index.html">Home</a>
    <a href="vinili.html">Vinili</a>
    <a href="login.html">Login</a>

    <span id="utente"></span>

    
  </nav>
</header>

<section class="hero">
  <h1>Scopri il suono autentico del vinile</h1>
  <p>I migliori album pop, rap e rock.</p>
</section>

<main>
  
<h3>Filtra per genere</h3>

<div class="filtri">
  <button onclick="filtraGenere('tutti', this)" class="attivo">Tutti</button>
  <button onclick="filtraGenere('pop', this)">Pop</button>
  <button onclick="filtraGenere('rap', this)">Rap</button>
  <button onclick="filtraGenere('rock', this)">Rock</button>
</div>
  
  <h2>Vinili in evidenza</h2>

  <!-- 🛒 CARRELLO -->
  <div id="carrello">
    <h3>🛒 Carrello</h3>
    <ul id="lista-carrello"></ul>
    <p>Totale: <span id="totale">0</span>€</p>
  </div>

<a href="checkout.html" class="checkout-btn">
  Vai al checkout
</a>


  <!-- 🎵 PRODOTTI -->
 <div class="container" id="container-vinili"></div>

</main>

<footer>
  <p>© SoundNest</p>
</footer>

<script>
  const vinili = [

  {
    nome: "Thriller",
    artista: "Michael Jackson",
    prezzo: 25,
    genere: "pop",
    immagine: "img/thriller.jpg"
  },

  {
    nome: "Utopia",
    artista: "Travis Scott",
    prezzo: 30,
    genere: "rap",
    immagine: "copertinautopia.jpg"
  },

  {
    nome: "Nevermind",
    artista: "Nirvana",
    prezzo: 28,
    genere: "rock",
    immagine: "img/nevermind.jpg"
  },

  {
    nome: "Random Access Memories",
    artista: "Daft Punk",
    prezzo: 35,
    genere: "pop",
    immagine: "img/ram.jpg"
  }
];

  const container =
document.getElementById("container-vinili");

function mostraVinili(lista){

  container.innerHTML = "";

  lista.forEach(vinile => {

    container.innerHTML += `

      <div class="card" data-genere="${vinile.genere}">

        <img src="${vinile.immagine}" alt="${vinile.nome}">

        <h3>${vinile.nome}</h3>

        <p>${vinile.artista}</p>

        <p>${vinile.prezzo}€</p>

        <button onclick="
          aggiungi(
            '${vinile.nome}',
            ${vinile.prezzo}
          )
        ">
          Compra
        </button>

      </div>

    `;
  });
}

  const datiUtente =
  JSON.parse(localStorage.getItem("utenteLoggato"));

if(datiUtente){

  document.getElementById("utente")
    .innerText =
    "👤 " + datiUtente.email;
}

  
  function logout(){

  localStorage.removeItem("utenteLoggato");

  window.location.href = "login.html";
}

  
function filtraGenere(genere, bottone){

  let filtrati;

  if(genere === "tutti"){

    filtrati = vinili;

  } else {

    filtrati = vinili.filter(v =>
      v.genere === genere
    );
  }

  mostraVinili(filtrati);

  let bottoni =
    document.querySelectorAll(".filtri button");

  bottoni.forEach(btn => {
    btn.classList.remove("attivo");
  });

  bottone.classList.add("attivo");
}

function aggiungi(nome, prezzo){

  const utente =
    localStorage.getItem("utenteLoggato");

  if(!utente){

    alert("Devi effettuare il login per acquistare");

    window.location.href = "login.html";

    return;
  }

  // prendo carrello esistente
  let carrello =
    JSON.parse(localStorage.getItem("carrello")) || [];

  // aggiungo prodotto
  carrello.push({
    nome: nome,
    prezzo: prezzo
  });

  // salvo carrello
  localStorage.setItem(
    "carrello",
    JSON.stringify(carrello)
  );

  aggiornaCarrello();
}
  function aggiornaCarrello(){

  let carrello =
    JSON.parse(localStorage.getItem("carrello")) || [];

  let lista =
    document.getElementById("lista-carrello");

  lista.innerHTML = "";

  let totale = 0;

  carrello.forEach(prodotto => {

    let item = document.createElement("li");

    item.innerText =
      prodotto.nome + " - " +
      prodotto.prezzo + "€";

    lista.appendChild(item);

    totale += prodotto.prezzo;
  });

  document.getElementById("totale")
    .innerText = totale;
}

// aggiorna carrello all'apertura pagina
aggiornaCarrello();
  mostraVinili(vinili);
</script>

</body>
</html>
